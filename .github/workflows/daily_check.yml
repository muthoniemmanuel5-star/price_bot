name: Price Tracker Bot

on:
  schedule:
    # This runs the script every day at 08:00 UTC (11:00 AM Kenya time)
    - cron: '0 8 * * *'
  workflow_dispatch: # This adds a "Run" button so you can test it manually

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pandas

      - name: Run Scraper
        env:
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: python scraper.py
